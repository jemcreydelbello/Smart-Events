<!DOCTYPE html>
<html>
<head>
    <title>Full Event Load Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .log { background: white; padding: 10px; margin: 5px 0; border-left: 3px solid #007bff; }
        .success { border-color: #28a745; }
        .error { border-color: #dc3545; }
        h2 { margin-top: 30px; }
    </style>
</head>
<body>
    <h1>Events Load Simulator</h1>
    <button onclick="simulateLoad()">Simulate Load</button>
    
    <div id="logs"></div>
    
    <script>
        const API_BASE = '../api';
        
        function log(msg, type='info') {
            const logs = document.getElementById('logs');
            const el = document.createElement('div');
            el.className = 'log ' + type;
            el.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
            logs.appendChild(el);
        }
        
        async function simulateLoad() {
            log('=== SIMULATION START ===', 'info');
            
            // Step 1: Check localStorage
            log('Step 1: Setting up localStorage', 'info');
            localStorage.setItem('admin', JSON.stringify({
                id: 1,
                username: 'admin',
                email: 'admin@example.com',
                full_name: 'Admin User',
                role: 'ADMIN'
            }));
            const admin = JSON.parse(localStorage.getItem('admin'));
            if (admin && admin.id) {
                log('✓ Admin in localStorage: ' + admin.full_name, 'success');
            } else {
                log('✗ Failed to set admin', 'error');
                return;
            }
            
            // Step 2: Build headers
            log('Step 2: Building headers', 'info');
            const headers = {
                'Content-Type': 'application/json',
                'X-User-Role': admin.role || 'GUEST',
                'X-User-Id': String(admin.id)
            };
            log('Headers: ' + JSON.stringify(headers), 'success');
            
            // Step 3: Fetch API
            log('Step 3: Calling API: ' + API_BASE + '/events.php?action=list', 'info');
            try {
                const response = await fetch(API_BASE + '/events.php?action=list', { headers });
                log('API Response status: ' + response.status, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                log('API Response JSON received', 'success');
                
                if (data.success) {
                    log('✓ API success=true', 'success');
                    log('✓ Events count: ' + (data.data ? data.data.length : 0), 'success');
                    
                    if (data.data && data.data.length > 0) {
                        log('✓ Sample events:', 'success');
                        data.data.slice(0, 3).forEach((e, i) => {
                            log('  [' + i + '] ' + e.event_name + ' on ' + e.event_date, 'success');
                        });
                    }
                } else {
                    log('✗ API returned success=false: ' + (data.message || 'unknown error'), 'error');
                }
                
                // Step 4: Test render logic
                log('Step 4: Testing render logic', 'info');
                if (data.data && data.data.length > 0) {
                    const event = data.data[0];
                    log('Rendering event: ' + event.event_name, 'success');
                    
                    // Test getImageUrl
                    const imageUrl = event.image_url ? (event.image_url.startsWith('uploads/') ? '../' + event.image_url : event.image_url) : null;
                    log('Image URL: ' + (imageUrl || 'none'), 'info');
                    
                    // Test date format
                    const eventDate = new Date(event.event_date).toLocaleDateString('en-US', { 
                        month: 'short', 
                        day: 'numeric', 
                        year: 'numeric' 
                    });
                    log('Formatted date: ' + eventDate, 'success');
                }
                
            } catch (error) {
                log('✗ API Error: ' + error.message, 'error');
                log('Stack: ' + error.stack, 'error');
            }
            
            log('=== SIMULATION END ===', 'info');
        }
    </script>
</body>
</html>
