<!DOCTYPE html>
<html>
<head>
    <title>Full Diagnostic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #1e1e1e; color: #00ff00; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #00ff00; border-radius: 4px;  }
        h2 { color: #00ff00; margin-top: 0; }
        .success { color: #00ff00; }
        .error { color: #ff6b6b; }
        .info { color: #87ceeb; }
        button { background: #00ff00; color: #1e1e1e; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #00cc00; }
        pre { background: #2d2d2d; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔧 Smart Events Diagnostic Tool</h1>
    
    <div class="section">
        <h2>Test 1: localStorage & Auth</h2>
        <button onclick="test1()">Run Test 1</button>
        <div id="test1-result"></div>
    </div>
    
    <div class="section">
        <h2>Test 2: Sidebar Load</h2>
        <button onclick="test2()">Run Test 2</button>
        <div id="test2-result"></div>
    </div>
    
    <div class="section">
        <h2>Test 3: API Response</h2>
        <button onclick="test3()">Run Test 3</button>
        <div id="test3-result"></div>
    </div>
    
    <div class="section">
        <h2>Test 4: Navigate to Events</h2>
        <button onclick="test4()">Run Test 4</button>
        <div id="test4-result"></div>
    </div>
    
    <div class="section">
        <h2>Full Flow Test</h2>
        <button onclick="fullTest()">Run Full Test</button>
        <div id="full-result"></div>
    </div>
    
    <script>
        function printResult(testId, html) {
            document.getElementById(testId + '-result').innerHTML = html;
        }
        
        function success(msg) { return '<div class="success">✓ ' + msg + '</div>'; }
        function error(msg) { return '<div class="error">✗ ' + msg + '</div>'; }
        function info(msg) { return '<div class="info">ℹ ' + msg + '</div>'; }
        
        async function test1() {
            let html = '';
            try {
                localStorage.setItem('admin', JSON.stringify({ id: 1, username: 'admin', email: 'admin@example.com', full_name: 'Admin User', role: 'ADMIN' }));
                const admin = JSON.parse(localStorage.getItem('admin'));
                if (admin && admin.id) {
                    html += success('Admin in localStorage');
                    html += info('ID: ' + admin.id + ', Role: ' + admin.role);
                } else {
                    html += error('Failed to set admin');
                }
            } catch (e) {
                html += error('localStorage error: ' + e.message);
            }
            printResult('test1', html);
        }
        
        async function test2() {
            let html = '';
            try {
                const response = await fetch('sidebar-nav.php');
                if (response.ok) {
                    const text = await response.text();
                    html += success('Sidebar-nav.php loaded (' + text.length + ' bytes)');
                    html += info('Contains "Events" link: ' + (text.includes('Events') ? 'YES' : 'NO'));
                    html += info('Contains "data-page" attribute: ' + (text.includes('data-page') ? 'YES' : 'NO'));
                } else {
                    html += error('HTTP ' + response.status);
                }
            } catch (e) {
                html += error('Fetch error: ' + e.message);
            }
            printResult('test2', html);
        }
        
        async function test3() {
            let html = '';
            try {
                const headers = {
                    'X-User-Role': 'ADMIN',
                    'X-User-Id': '1',
                    'Content-Type': 'application/json'
                };
                const response = await fetch('../api/events.php?action=list', { headers });
                html += info('API Status: ' + response.status);
                
                const data = await response.json();
                if (data.success) {
                    html += success('API returned success=true');
                    html += success('Events count: ' + (data.data ? data.data.length : 0));
                    if (data.data && data.data[0]) {
                        html += info('First event: ' + data.data[0].event_name);
                    }
                } else {
                    html += error('API returned success=false: ' + data.message);
                }
            } catch (e) {
                html += error('API Error: ' + e.message);
            }
            printResult('test3', html);
        }
        
        async function test4() {
            let html = '';
            html += info('This would navigate to: /Smart-Events/admin/index.html?page=events');
            html += '<br>' + info('Opening in new window for inspection...');
            printResult('test4', html);
            
            setTimeout(() => {
                window.open('/Smart-Events/admin/index.html?page=events', '_blank');
            }, 1000);
        }
        
        async function fullTest() {
            let html = '<h3>Running Full Test...</h3>';
            
            // Setup auth
            localStorage.setItem('admin', JSON.stringify({ id: 1, username: 'admin', email: 'admin@example.com', full_name: 'Admin', role: 'ADMIN' }));
            html += success('1. Auth setup complete');
            
            // Test sidebar
            try {
                const sidebarRes = await fetch('sidebar-nav.php');
                if (sidebarRes.ok) {
                    html += success('2. Sidebar loads OK');
                } else {
                    html += error('2. Sidebar HTTP ' + sidebarRes.status);
                }
            } catch (e) {
                html += error('2. Sidebar fetch: ' + e.message);
            }
            
            // Test API
            try {
                const apiRes = await fetch('../api/events.php?action=list', {
                    headers: { 'X-User-Role': 'ADMIN', 'X-User-Id': '1' }
                });
                const apiData = await apiRes.json();
                if (apiData.success && apiData.data) {
                    html += success('3. API returns ' + apiData.data.length + ' events');
                } else {
                    html += error('3. API failed: ' + apiData.message);
                }
            } catch (e) {
                html += error('3. API error: ' + e.message);
            }
            
            // Test navigation
            html += info('4. Ready to navigate to Events page');
            html += '<br><button onclick="window.location.href=\\'/Smart-Events/admin/index.html?page=events\\'">Open Events Page</button>';
            
            printResult('full', html);
        }
    </script>
</body>
</html>
