<!DOCTYPE html>
<html>
<head>
    <title>Test Event API</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; font-family: monospace; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 4px; overflow-x: auto; }
        input { padding: 8px; margin: 5px 0; width: 200px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Event API Test</h1>
        
        <div>
            <label>Event ID:</label><br>
            <input type="number" id="eventId" value="1" placeholder="Enter event ID">
            <button onclick="testEventAPI()">Test API</button>
        </div>
        
        <h2>Results:</h2>
        <div id="output"></div>
    </div>

    <script>
        const API_BASE = '../api';
        const output = document.getElementById('output');

        function testEventAPI() {
            const eventId = document.getElementById('eventId').value;
            if (!eventId) {
                addOutput('Please enter an event ID', 'error');
                return;
            }

            output.innerHTML = '';
            addOutput(`Testing API for event ID: ${eventId}`, 'info');
            
            const url = `${API_BASE}/events.php?action=detail&event_id=${eventId}`;
            addOutput(`URL: ${url}`, 'info');
            
            fetch(url)
                .then(r => {
                    addOutput(`HTTP Status: ${r.status}`, r.ok ? 'success' : 'error');
                    return r.json();
                })
                .then(data => {
                    addOutput(`Response:`, 'info');
                    addOutput(`<pre>${JSON.stringify(data, null, 2)}</pre>`, 'info');
                    
                    if (data.success && data.data) {
                        const event = data.data;
                        addOutput(`<strong>✓ Event Found:</strong> ${event.event_name}`, 'success');
                        addOutput(`Location: ${event.location}`, 'success');
                        addOutput(`Date: ${event.event_date}`, 'success');
                        addOutput(`Time: ${event.start_time} - ${event.end_time}`, 'success');
                        addOutput(`Description: ${event.description}`, 'success');
                    } else {
                        addOutput(`✗ ${data.message || 'No data returned'}`, 'error');
                    }
                })
                .catch(e => addOutput(`✗ Error: ${e.message}`, 'error'));
        }

        function addOutput(msg, type = 'info') {
            const el = document.createElement('div');
            el.className = 'status ' + type;
            el.innerHTML = msg;
            output.appendChild(el);
        }

        // Test on page load with event ID 1
        window.addEventListener('load', () => {
            setTimeout(testEventAPI, 500);
        });
    </script>
</body>
</html>
