<!DOCTYPE html>
<html>
<head>
    <title>Test - List All Events</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f0f0f0; font-weight: 600; }
        tr:hover { background: #f9f9f9; }
        .test-link { color: #0066cc; text-decoration: underline; cursor: pointer; }
        .test-link:hover { text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Event List Test</h1>
        <p>This page will test loading all events and show their IDs so you can click through to verify the event-details page works.</p>
        
        <button onclick="loadAllEvents()">Load All Events</button>
        
        <div id="output"></div>
        
        <table id="eventTable" style="display: none;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Event Name</th>
                    <th>Location</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="eventBody"></tbody>
        </table>
    </div>

    <script>
        const API_BASE = '../api';

        function loadAllEvents() {
            document.getElementById('output').innerHTML = '<p>Loading events...</p>';
            
            fetch(`${API_BASE}/events.php?action=list`)
                .then(r => {
                    console.log('Response status:', r.status);
                    return r.json();
                })
                .then(data => {
                    console.log('API response:', data);
                    
                    if (data.success && data.data && data.data.length > 0) {
                        populateTable(data.data);
                        document.getElementById('output').innerHTML = `<p style="color: green;">✓ Found ${data.data.length} events</p>`;
                    } else {
                        document.getElementById('output').innerHTML = `<p style="color: red;">✗ No events found or error: ${data.message || 'Unknown'}</p>`;
                        console.log('Full response:', data);
                    }
                })
                .catch(e => {
                    console.error('Error:', e);
                    document.getElementById('output').innerHTML = `<p style="color: red;">✗ Error: ${e.message}</p>`;
                });
        }

        function populateTable(events) {
            const tbody = document.getElementById('eventBody');
            tbody.innerHTML = '';
            
            events.forEach(event => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${event.event_id}</td>
                    <td>${event.event_name}</td>
                    <td>${event.location || '-'}</td>
                    <td>${event.event_date || '-'}</td>
                    <td><span class="test-link" onclick="openEventDetails(${event.event_id})">View Details</span></td>
                `;
            });
            
            document.getElementById('eventTable').style.display = 'table';
        }

        function openEventDetails(eventId) {
            window.location.href = `event-details.html?id=${eventId}`;
        }

        // Load events on page load
        window.addEventListener('load', loadAllEvents);
    </script>
</body>
</html>
