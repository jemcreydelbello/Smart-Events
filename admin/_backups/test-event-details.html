<!DOCTYPE html>
<html>
<head>
    <title>Test Event Details</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Event Details Debugging</h1>
        
        <div id="debugOutput"></div>
        
        <h2>Test Steps:</h2>
        <button onclick="testLocalStorage()">Test 1: Check localStorage</button>
        <button onclick="testEventDetailsPageLoad()">Test 2: Load Event Details HTML</button>
        <button onclick="testJSFile()">Test 3: Check JS File Loads</button>
        <button onclick="testNavigateFunction()">Test 4: Check navigate function</button>
    </div>

    <script>
        const debugDiv = document.getElementById('debugOutput');

        function addDebug(message, type = 'info') {
            const el = document.createElement('div');
            el.className = 'status ' + type;
            el.textContent = message;
            debugDiv.appendChild(el);
        }

        function testLocalStorage() {
            debugDiv.innerHTML = '';
            addDebug('Testing localStorage...', 'info');
            
            const admin = JSON.parse(localStorage.getItem('admin') || '{}');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            addDebug(`Admin data present: ${Object.keys(admin).length > 0}`, admin.id ? 'success' : 'error');
            addDebug(`Admin role: ${admin.role || 'NOT SET'}`, admin.role ? 'success' : 'error');
            addDebug(`User data present: ${Object.keys(user).length > 0}`, user.id ? 'success' : 'error');
            
            if (admin.id) {
                addDebug(`Logged in as: ${admin.email || admin.id}`, 'success');
            }
        }

        function testEventDetailsPageLoad() {
            debugDiv.innerHTML = '';
            addDebug('Testing event-details.html file...', 'info');
            
            fetch('event-details.html')
                .then(r => {
                    addDebug(`HTTP Status: ${r.status}`, r.ok ? 'success' : 'error');
                    return r.text();
                })
                .then(html => {
                    const hasScript = html.includes('event-details.js');
                    addDebug(`JavaScript include present: ${hasScript}`, hasScript ? 'success' : 'error');
                    
                    const hasTabs = html.includes('event-tab-content');
                    addDebug(`Tab structure present: ${hasTabs}`, hasTabs ? 'success' : 'error');
                    
                    const lines = html.split('\n').length;
                    addDebug(`File size: ${lines} lines`, 'info');
                })
                .catch(e => addDebug('Error loading file: ' + e.message, 'error'));
        }

        function testJSFile() {
            debugDiv.innerHTML = '';
            addDebug('Testing event-details.js file...', 'info');
            
            fetch('js/event-details.js')
                .then(r => {
                    addDebug(`HTTP Status: ${r.status}`, r.ok ? 'success' : 'error');
                    return r.text();
                })
                .then(js => {
                    const hasLoadEventDetails = js.includes('function loadEventDetails');
                    addDebug(`loadEventDetails function: ${hasLoadEventDetails}`, hasLoadEventDetails ? 'success' : 'error');
                    
                    const hasBackFunction = js.includes('function backToEventsList');
                    addDebug(`backToEventsList function: ${hasBackFunction}`, hasBackFunction ? 'success' : 'error');
                    
                    const hasAPICall = js.includes('API_BASE');
                    addDebug(`API_BASE defined: ${hasAPICall}`, hasAPICall ? 'success' : 'error');
                    
                    const lines = js.split('\n').length;
                    addDebug(`File size: ${lines} lines`, 'info');
                })
                .catch(e => addDebug('Error loading file: ' + e.message, 'error'));
        }

        function testNavigateFunction() {
            debugDiv.innerHTML = '';
            addDebug('Testing navigation function...', 'info');
            
            if (typeof navigateToEventDetails !== 'undefined') {
                addDebug('navigateToEventDetails function exists (from main.js)', 'success');
            } else {
                addDebug('navigateToEventDetails function NOT found', 'error');
            }
            
            // Try to navigate to a test event
            addDebug('Test URL would be: event-details.html?id=1', 'info');
            addDebug('Click here to test: <a href="event-details.html?id=1" style="color: #0066cc; text-decoration: underline;">event-details.html?id=1</a>', 'info');
        }

        // Auto-run tests on page load
        window.addEventListener('load', () => {
            testLocalStorage();
        });
    </script>
</body>
</html>
