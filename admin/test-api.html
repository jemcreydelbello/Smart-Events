<!DOCTYPE html>
<html>
<head>
    <title>API Response Tester</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Events API Tester</h1>
    
    <button onclick="testAPI()">Test API Call</button>
    
    <div id="result" style="margin-top: 20px;"></div>
    
    <script>
        function testAPI() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>Testing 3 scenarios...</p>';
            
            let html = '<h2>Test 1: URL without parameters</h2>';
            fetch('../api/events.php')
                .then(r => r.json())
                .then(data => {
                    html += '<p class="success">✓ Status OK</p>';
                    html += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                    result.innerHTML += html;
                })
                .catch(e => {
                    html += '<p class="error">✗ Error: ' + e.message + '</p>';
                    result.innerHTML += html;
                });
            
            html = '<h2>Test 2: With action=list parameter</h2>';
            fetch('../api/events.php?action=list')
                .then(r => r.json())
                .then(data => {
                    html += '<p class="success">✓ Status OK</p>';
                    html = '<p>Data count: ' + (data.data ? data.data.length : 'null') + '</p>';
                    html += '<pre>' + JSON.stringify(data, null, 2).substring(0, 500) + '...</pre>';
                    result.innerHTML += html;
                })
                .catch(e => {
                    html += '<p class="error">✗ Error: ' + e.message + '</p>';
                    result.innerHTML += html;
                });
            
            html = '<h2>Test 3: With ADMIN headers (simulating logged-in admin)</h2>';
            const headers = {
                'X-User-Role': 'ADMIN',
                'X-User-Id': '1'
            };
            fetch('../api/events.php?action=list', { headers })
                .then(r => r.json())
                .then(data => {
                    html += '<p class="success">✓ Status OK</p>';
                    html += '<p> Data count: ' + (data.data ? data.data.length : 'null') + '</p>';
                    if (data.success) {
                        html += '<p class="success">✓ API returned success=true</p>';
                    } else {
                        html += '<p class="error">✗ API returned success=false</p>';
                    }
                    html += '<pre>' + JSON.stringify(data, null, 2).substring(0, 500) + '...</pre>';
                    result.innerHTML += html;
                })
                .catch(e => {
                    html += '<p class="error">✗ Error: ' + e.message + '</p>';
                    result.innerHTML += html;
                });
        }
    </script>
</body>
</html>
