<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Smart Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1F4CC4 0%, #1538A0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            color: #1F4CC4;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #6b7280;
            font-size: 14px;
        }

        .login-type-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: #f3f4f6;
            padding: 6px;
            border-radius: 8px;
        }

        .login-type-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            color: #6b7280;
            font-weight: 600;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-type-btn.active {
            background: white;
            color: #1F4CC4;
            box-shadow: 0 2px 8px rgba(31, 76, 196, 0.15);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1F4CC4;
            box-shadow: 0 0 0 3px rgba(31, 76, 196, 0.1);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .signin-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1F4CC4 0%, #1538A0 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .signin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(31, 76, 196, 0.3);
        }

        .signin-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            display: none;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #dcfce7;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .forgot-password {
            text-align: center;
            margin-top: 16px;
        }

        .forgot-password a {
            color: #1F4CC4;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .forgot-password a:hover {
            color: #1538A0;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Sign In</h1>
            <p>Access Smart Events Dashboard</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <!-- Login Type Selector -->
        <div class="login-type-selector">
            <button type="button" class="login-type-btn active" onclick="switchLoginType('admin')">Admin</button>
            <button type="button" class="login-type-btn" onclick="switchLoginType('coordinator')">Coordinator</button>
        </div>

        <!-- Admin Login Form -->
        <div id="adminForm" class="form-section active">
            <form onsubmit="handleAdminLogin(event)" id="adminLoginForm">
                <div class="form-group">
                    <label>Username or Email</label>
                    <input type="text" id="admin_username" name="username" placeholder="Enter your username or email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="admin_password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="signin-btn">Sign In</button>
            </form>

            <div class="forgot-password">
                <a href="forget-password.php">Forgot Password?</a>
            </div>
        </div>

        <!-- Coordinator Login Form -->
        <div id="coordinatorForm" class="form-section">
            <form onsubmit="handleCoordinatorLogin(event)" id="coordinatorLoginForm">
                <div class="form-group">
                    <label>Email or Username</label>
                    <input type="text" id="coordinator_email" name="email" placeholder="Enter your email or username" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="coordinator_password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="signin-btn">Sign In</button>
            </form>

            <div class="forgot-password">
                <a href="forget-password.php">Forgot Password?</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '../api';

        function showAlert(message, type = 'error') {
            const alertBox = document.getElementById('alertBox');
            if (alertBox) {
                alertBox.textContent = message;
                alertBox.className = `alert show alert-${type}`;

                if (type === 'success') {
                    setTimeout(() => {
                        alertBox.classList.remove('show');
                    }, 2000);
                }
            }
        }

        function switchLoginType(type) {
            const adminForm = document.getElementById('adminForm');
            const coordinatorForm = document.getElementById('coordinatorForm');
            const adminBtn = document.querySelector('[onclick="switchLoginType(\'admin\')"]');
            const coordBtn = document.querySelector('[onclick="switchLoginType(\'coordinator\')"]');

            if (type === 'admin') {
                adminForm.classList.add('active');
                coordinatorForm.classList.remove('active');
                adminBtn.classList.add('active');
                coordBtn.classList.remove('active');
            } else {
                coordinatorForm.classList.add('active');
                adminForm.classList.remove('active');
                coordBtn.classList.add('active');
                adminBtn.classList.remove('active');
            }

            document.getElementById('alertBox').className = 'alert';
            document.getElementById('alertBox').textContent = '';
        }

        function handleAdminLogin(event) {
            event.preventDefault();

            const username = document.getElementById('admin_username').value.trim();
            const password = document.getElementById('admin_password').value;
            const loginBtn = document.querySelector('#adminLoginForm button[type="submit"]');

            if (!username || !password) {
                showAlert('Please enter both username/email and password', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            fetch(`${API_BASE}/admin_login.php?action=login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
            .then(response => {
                if (response.status === 429) {
                    showAlert('Too many failed login attempts. Account is locked for 30 minutes.', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                    throw new Error('Account locked');
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    localStorage.setItem('admin', JSON.stringify(data.admin));
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = './index.html';
                    }, 1000);
                } else {
                    showAlert(data.message || 'Login failed. Invalid credentials.', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                }
            })
            .catch(error => {
                console.error('Login error:', error);
                if (error.message !== 'Account locked') {
                    showAlert('Connection error. Please try again.', 'error');
                }
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            });
        }

        function handleCoordinatorLogin(event) {
            event.preventDefault();

            const email = document.getElementById('coordinator_email').value.trim();
            const password = document.getElementById('coordinator_password').value;
            const submitBtn = document.querySelector('#coordinatorLoginForm button[type="submit"]');

            if (!email || !password) {
                showAlert('Please enter both email/username and password', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            fetch(`${API_BASE}/admin_login.php?action=coordinator_login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            })
            .then(response => {
                if (response.status === 429) {
                    showAlert('Too many failed login attempts. Account is locked for 30 minutes.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                    throw new Error('Account locked');
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = './index.html?page=events';
                    }, 1000);
                } else {
                    showAlert(data.message || 'Login failed. Invalid credentials.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                }
            })
            .catch(error => {
                console.error('Login error:', error);
                if (error.message !== 'Account locked') {
                    showAlert('Connection error. Please try again.', 'error');
                }
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            });
        }

        window.addEventListener('load', function() {
            const admin = localStorage.getItem('admin');
            const user = localStorage.getItem('user');

            if (admin || user) {
                window.location.href = './index.html';
            }
        });


        document.getElementById('coordinator_password')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('coordinatorLoginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
