<!DOCTYPE html>
<html>
<head>
    <title>Edit Modal Test</title>
</head>
<body>
    <h1>Edit Modal Form Test</h1>
    <p>This simulates the edit modal form submission to test if action parameter is sent correctly.</p>
    
    <form id="testEditForm" onsubmit="handleSubmit(event)">
        <input type="hidden" id="testEventId" value="999">
        <input type="hidden" id="testAction" value="update_event">
        <input type="text" id="testTitle" value="Test Event Title">
        <input type="text" id="testLocation" value="Test Location">
        <input type="datetime-local" id="testStart" value="2026-03-20T10:00">
        <input type="datetime-local" id="testEnd" value="2026-03-20T12:00">
        <input type="number" id="testCapacity" value="50">
        <input type="text" id="testDesc" value="Test Description">
        <input type="text" id="testRegStart" value="">
        <input type="text" id="testRegEnd" value="">
        <button type="submit">Submit Test Form</button>
    </form>
    
    <h2>Response:</h2>
    <pre id="response">Waiting for submission...</pre>
    
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            
            const formData = new FormData();
            formData.append('action', 'update_event');
            formData.append('event_id', document.getElementById('testEventId').value);
            formData.append('event_name', document.getElementById('testTitle').value);
            formData.append('location', document.getElementById('testLocation').value);
            formData.append('start_event', document.getElementById('testStart').value + ':00');
            formData.append('end_event', document.getElementById('testEnd').value + ':00');
            formData.append('capacity', document.getElementById('testCapacity').value);
            formData.append('description', document.getElementById('testDesc').value);
            formData.append('registration_link', '');
            formData.append('website_link', '');
            formData.append('is_private', '0');
            formData.append('registration_start', '');
            formData.append('registration_end', '');
            
            console.log('FormData entries:');
            for (let [key, value] of formData.entries()) {
                console.log(`  ${key}: ${value}`);
            }
            
            fetch('../api/events.php', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('response').textContent = JSON.stringify(data, null, 2);
            })
            .catch(err => {
                document.getElementById('response').textContent = 'ERROR: ' + err.message;
            });
        }
    </script>
</body>
</html>
