<!DOCTYPE html>
<html>
<head>
    <title>Manual Navigation Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        textarea { width: 100%; height: 300px; border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>
    <h1>Manual Navigation Test</h1>
    <p>This will manually navigate to Events and log what happens</p>
    
    <button onclick="testManualNav()">Test Manual Navigation</button>
    
    <h2>Console Log Output:</h2>
    <textarea id="log"></textarea>
    
    <script>
        // Capture logs
        const logs = [];
        const originalLog = console.log;
        const originalError = console.error;
        console.log = function(...args) {
            logs.push('[LOG] ' + args.join(' '));
            document.getElementById('log').value = logs.join('\n');
            originalLog.apply(console, args);
        };
        console.error = function(...args) {
            logs.push('[ERROR] ' + args.join(' '));
            document.getElementById('log').value = logs.join('\n');
            originalError.apply(console, args);
        };
        
        function testManualNav() {
            logs.length = 0;
            document.getElementById('log').value = '';
            
            logs.push('Starting manual navigation test...');
            
            // Simulate auth
            localStorage.setItem('admin', JSON.stringify({
                id: 1, email: 'admin@example.com', role: 'ADMIN', full_name: 'Admin'
            }));
            logs.push('Admin set in localStorage');
            
            // Redirect to events page
            logs.push('Redirecting to index.html?page=events');
            setTimeout(() => {
                window.location.href = '/Smart-Events/admin/index.html?page=events';
            }, 1000);
        }
    </script>
</body>
</html>
