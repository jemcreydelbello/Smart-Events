<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Debug Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #4ec9b0;
            margin-bottom: 20px;
        }
        .section {
            background: #252526;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h2 {
            color: #4ec9b0;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #9cdcfe;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #d4d4d4;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #007acc;
            box-shadow: 0 0 0 2px rgba(0, 122, 204, 0.1);
        }
        button {
            background: #007acc;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            margin-right: 10px;
            margin-top: 10px;
        }
        button:hover {
            background: #005a9e;
        }
        .log {
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 15px;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .log-line {
            margin: 3px 0;
            padding: 2px 0;
        }
        .log-success { color: #4ec9b0; }
        .log-error { color: #f48771; }
        .log-info { color: #9cdcfe; }
        .log-warn { color: #dcdcaa; }
        .event-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .event-selector select {
            flex: 1;
            padding: 8px;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #d4d4d4;
            border-radius: 4px;
        }
        .status-box {
            background: #2d2d30;
            border-left: 4px solid #007acc;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .status-box.success {
            border-left-color: #4ec9b0;
            background: #1a3a2d;
        }
        .status-box.error {
            border-left-color: #f48771;
            background: #3a1a1a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Registration Debug Tool</h1>
        <p style="margin-bottom: 20px; color: #858585;">Test registration flow and capture what's happening</p>

        <!-- Event Selection -->
        <div class="section">
            <h2>📋 Step 1: Select Event</h2>
            <div class="event-selector">
                <select id="eventSelect">
                    <option value="">Loading events...</option>
                </select>
                <button onclick="loadEventDetails()">Load Event</button>
            </div>
            <div id="eventInfo"></div>
        </div>

        <!-- Registration Form -->
        <div class="section">
            <h2>📝 Step 2: Registration Form</h2>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="fullName" placeholder="John Doe" value="Test User">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="john@example.com" value="test@example.com">
            </div>
            <div class="form-group">
                <label>Company *</label>
                <input type="text" id="company" placeholder="Wells Fargo" value="Test Company">
            </div>
            <div class="form-group">
                <label>Job Title *</label>
                <input type="text" id="jobTitle" placeholder="Analyst" value="Test Title">
            </div>
            <div class="form-group">
                <label>Employee Code *</label>
                <input type="text" id="employeeCode" placeholder="EMP001" value="EMP001">
            </div>
            <div class="form-group">
                <label>Phone *</label>
                <input type="tel" id="phone" placeholder="+1234567890" value="+1234567890">
            </div>
            <button onclick="submitRegistration()">Submit Registration</button>
            <button onclick="clearLog()">Clear Log</button>
        </div>

        <!-- Debug Log -->
        <div class="section">
            <h2>📊 Debug Log</h2>
            <div class="log" id="debugLog"></div>
        </div>

        <!-- Status -->
        <div class="section">
            <h2>✅ Status</h2>
            <div id="statusBox"></div>
        </div>
    </div>

    <script>
        const API_BASE = '../api';
        let selectedEventId = null;

        function log(message, type = 'info') {
            const logEl = document.getElementById('debugLog');
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            line.textContent = `[${timestamp}] ${message}`;
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
            console.log(`[${type}]`, message);
        }

        function clearLog() {
            document.getElementById('debugLog').innerHTML = '';
            log('Log cleared', 'info');
        }

        function setStatus(message, type = 'info') {
            const statusEl = document.getElementById('statusBox');
            statusEl.innerHTML = `<div class="status-box ${type}">${message}</div>`;
        }

        // Load events on page load
        document.addEventListener('DOMContentLoaded', function() {
            log('🔄 Page loaded, fetching events...', 'info');
            loadEvents();
        });

        function loadEvents() {
            log('Fetching events from API...', 'info');
            
            fetch(`${API_BASE}/events.php?action=list_all`)
                .then(r => {
                    log(`📡 Events API response: ${r.status}`, 'info');
                    return r.json();
                })
                .then(data => {
                    log(`✓ Received ${data.data?.length || 0} events`, 'success');
                    
                    const select = document.getElementById('eventSelect');
                    select.innerHTML = '<option value="">-- Select an Event --</option>';
                    
                    if (data.data && data.data.length > 0) {
                        data.data.forEach(event => {
                            const option = document.createElement('option');
                            option.value = event.event_id;
                            option.textContent = `Event ${event.event_id}: ${event.event_name} (${event.event_date})`;
                            select.appendChild(option);
                        });
                        log(`Events loaded successfully`, 'success');
                    } else {
                        log('⚠ No events found', 'warn');
                    }
                })
                .catch(error => {
                    log(`✗ Error loading events: ${error.message}`, 'error');
                    setStatus(`❌ Error: ${error.message}`, 'error');
                });
        }

        function loadEventDetails() {
            selectedEventId = document.getElementById('eventSelect').value;
            
            if (!selectedEventId) {
                log('❌ Please select an event', 'error');
                setStatus('❌ Please select an event', 'error');
                return;
            }

            log(`Loading details for Event ${selectedEventId}...`, 'info');
            
            fetch(`${API_BASE}/events.php?action=detail&event_id=${selectedEventId}`)
                .then(r => r.json())
                .then(data => {
                    if (data.success && data.data) {
                        const event = data.data;
                        log(`✓ Event loaded: "${event.event_name}"`, 'success');
                        
                        let html = `
                            <div style="background: #2d2d30; padding: 10px; border-radius: 4px; margin-top: 10px;">
                                <strong>Event:</strong> ${event.event_name}<br>
                                <strong>Date:</strong> ${event.event_date}<br>
                                <strong>Time:</strong> ${event.start_time} - ${event.end_time}<br>
                                <strong>Location:</strong> ${event.location}<br>
                                <strong>Capacity:</strong> ${event.capacity}<br>
                                <strong>Available Spots:</strong> ${event.available_spots || 'Unknown'}
                            </div>
                        `;
                        document.getElementById('eventInfo').innerHTML = html;
                        setStatus(`✓ Event ${selectedEventId} selected and ready for registration`, 'success');
                    } else {
                        log(`✗ Event not found`, 'error');
                        setStatus(`❌ Event not found`, 'error');
                    }
                })
                .catch(error => {
                    log(`✗ Error: ${error.message}`, 'error');
                    setStatus(`❌ Error: ${error.message}`, 'error');
                });
        }

        function submitRegistration() {
            if (!selectedEventId) {
                log('❌ No event selected', 'error');
                setStatus('❌ Please select an event first', 'error');
                return;
            }

            const eventId = parseInt(selectedEventId);
            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const company = document.getElementById('company').value.trim();
            const jobTitle = document.getElementById('jobTitle').value.trim();
            const employeeCode = document.getElementById('employeeCode').value.trim();
            const phone = document.getElementById('phone').value.trim();

            log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
            log('📤 STARTING REGISTRATION SUBMISSION', 'info');
            log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');

            // Validation
            if (!name || !email || !company || !jobTitle || !employeeCode || !phone) {
                log('❌ VALIDATION FAILED: Missing required fields', 'error');
                setStatus('❌ All fields are required', 'error');
                return;
            }

            log(`✓ All fields filled:`, 'success');
            log(`  - Name: ${name}`, 'info');
            log(`  - Email: ${email}`, 'info');
            log(`  - Company: ${company}`, 'info');
            log(`  - Job Title: ${jobTitle}`, 'info');
            log(`  - Employee Code: ${employeeCode}`, 'info');
            log(`  - Phone: ${phone}`, 'info');
            log(`  - Event ID: ${eventId}`, 'info');

            const payload = {
                event_id: eventId,
                participant_name: name,
                participant_email: email,
                company: company,
                job_title: jobTitle,
                employee_code: employeeCode,
                participant_phone: phone,
                status: 'REGISTERED'
            };

            log(`📦 Payload prepared: ${JSON.stringify(payload)}`, 'info');
            log(`📡 Sending to ${API_BASE}/participants.php...`, 'info');

            setStatus('⏳ Submitting registration...', 'info');

            fetch(`${API_BASE}/participants.php`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(response => {
                log(`📡 API Response Status: ${response.status}`, 'info');
                log(`📡 Response Headers:`, 'info');
                log(`  - Content-Type: ${response.headers.get('content-type')}`, 'info');
                
                return response.json().then(data => ({
                    status: response.status,
                    data: data
                }));
            })
            .then(result => {
                log(`✓ Response received as JSON`, 'success');
                log(`📊 Response: ${JSON.stringify(result.data, null, 2)}`, 'info');
                
                if (result.data.success) {
                    log(`✓ ✓ REGISTRATION SUCCESSFUL! ✓ ✓`, 'success');
                    log(`Registration Code: ${result.data.registration_code}`, 'success');
                    setStatus(`✅ Registration successful! Code: ${result.data.registration_code}`, 'success');
                } else {
                    log(`✗ Registration failed: ${result.data.message}`, 'error');
                    setStatus(`❌ ${result.data.message}`, 'error');
                }
            })
            .catch(error => {
                log(`✗ ✗ NETWORK ERROR ✗ ✗`, 'error');
                log(`Error: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
                setStatus(`❌ Network Error: ${error.message}`, 'error');
            });

            log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
        }
    </script>
</body>
</html>
