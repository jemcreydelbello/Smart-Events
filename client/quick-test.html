<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Registration Test</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            background: #1F4CC4;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            width: 100%;
        }
        button:hover {
            background: #1538A0;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .result.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 2px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🧪 Quick Registration Test</h1>
        <p class="subtitle">Test if registrations are being saved</p>

        <div>
            <label><strong>Email (must be unique):</strong></label>
            <input type="email" id="email" placeholder="newuser@example.com" value="">
            
            <label><strong>Full Name:</strong></label>
            <input type="text" id="name" placeholder="John Doe" value="Test User">
            
            <label><strong>Company:</strong></label>
            <input type="text" id="company" placeholder="Company" value="Test Co">
            
            <label><strong>Job Title:</strong></label>
            <input type="text" id="jobTitle" placeholder="Position" value="Tester">
            
            <label><strong>Employee Code:</strong></label>
            <input type="text" id="empCode" placeholder="EMP123" value="EMP-999">
            
            <label><strong>Phone:</strong></label>
            <input type="tel" id="phone" placeholder="+1234567890" value="+1234567890">

            <button onclick="submitTest()">Test Registration</button>
        </div>

        <div id="result" class="result"></div>
    </div>

    <script>
        function generateUniqueEmail() {
            return `test-${Date.now()}@example.com`;
        }

        function submitTest() {
            const email = document.getElementById('email').value.trim();
            
            if (!email) {
                const uniqueEmail = generateUniqueEmail();
                document.getElementById('email').value = uniqueEmail;
                return;
            }

            const formData = {
                event_id: 9,
                participant_name: document.getElementById('name').value.trim(),
                participant_email: email,
                company: document.getElementById('company').value.trim(),
                job_title: document.getElementById('jobTitle').value.trim(),
                employee_code: document.getElementById('empCode').value.trim(),
                participant_phone: document.getElementById('phone').value.trim(),
                status: 'REGISTERED'
            };

            console.log('Submitting:', formData);

            fetch('../api/participants.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(r => r.json())
            .then(data => {
                console.log('Response:', data);
                const resultEl = document.getElementById('result');
                
                if (data.success) {
                    resultEl.className = 'result success';
                    resultEl.innerHTML = `
                        <strong>✅ SUCCESS!</strong><br>
                        Registration saved to database!<br><br>
                        <strong>Details:</strong><br>
                        Email: <code>${email}</code><br>
                        Name: <code>${formData.participant_name}</code><br>
                        Registration Code: <code>${data.registration_code}</code><br><br>
                        <strong>Next:</strong> Go to admin and check <code>verify-registrations.html?id=9</code> to see this registration in the participants list.
                    `;
                } else {
                    resultEl.className = 'result info';
                    resultEl.innerHTML = `
                        <strong>ℹ️ Message:</strong> ${data.message}<br>
                        (This is normal if you try with the same email twice)
                    `;
                }
            })
            .catch(error => {
                const resultEl = document.getElementById('result');
                resultEl.className = 'result error';
                resultEl.innerHTML = `<strong>❌ ERROR:</strong> ${error.message}`;
                console.error(error);
            });
        }

        // Generate unique email on page load
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('email').value = generateUniqueEmail();
        });
    </script>
</body>
</html>
