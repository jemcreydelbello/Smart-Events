<!-- EVENT REG MODAL -->
<div id="eventModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="relative bg-white rounded-2xl w-full max-w-4xl mx-4 overflow-hidden max-h-[85vh] flex flex-col">
        <button onclick="closeQrModal()" class="absolute top-4 right-4 z-10 bg-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-slate-100 transition shadow-md">
            <i class="bi bi-x text-xl text-slate-700"></i>
        </button>
        <div id="eventModalImage" class="h-48 bg-cover bg-center flex-shrink-0" style="background-image: url('https://picsum.photos/seed/wf1/900/600');"></div>
        
        <div id="eventModalBody" class="p-5 grid gap-6 md:grid-cols-2 overflow-y-auto flex-1">
            <div id="eventModalInfoPanel" class="space-y-3 flex flex-col">
                <div class="flex items-start justify-between">
                    <div>
                        <h3 id="eventModalTitle" class="text-2xl font-semibold"></h3>
                        <p id="eventModalMeta" class="text-sm text-slate-500"></p>
                        
                    </div>
                </div>
                <p id="eventModalDesc" class="text-slate-600 text-justify"></p>
                
                <!-- Registration Details -->
                <div class="mt-4 pt-4 border-t border-slate-200 space-y-1 text-sm text-slate-600">
                    <div><i class="bi bi-calendar-check text-gray-600"></i> <span class="font-semibold">Registration Opens:</span> <span id="eventModalRegStart" class="text-slate-900">-</span></div>
                    <div><i class="bi bi-calendar-x text-gray-600"></i> <span class="font-semibold">Registration Closes:</span> <span id="eventModalRegEnd" class="text-slate-900">-</span></div>
                </div>
                
                <p class="text-base text-slate-700"><span class="font-bold text-red-700">Total Participants:</span> <span id="eventModalParticipants" class="font-bold text-slate-900">0</span></p>

            </div>
            
            <div id="eventModalRegisterPanel" class="">
                <div id="registerTitleSection" class="flex items-center justify-between mb-4">
                    <h4 id="eventModalRegisterTitle" class="text-lg font-semibold">Register</h4>
                </div>
                <form id="registerForm" class="mt-4 space-y-3" onsubmit="submitRegistration(event)">
                    <div class="relative">
                        <input required="" name="firstName" type="text" class="peer w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-blue-600 focus:outline-none">
                        <label class="absolute left-4 top-3 text-slate-400 text-sm transition-all peer-focus:-top-2 peer-focus:text-xs peer-focus:text-blue-600 peer-valid:-top-2 peer-valid:text-xs">First Name</label>
                    </div>
                    <div class="relative">
                        <input name="middleName" type="text" class="peer w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-blue-600 focus:outline-none">
                        <label class="absolute left-4 top-3 text-slate-400 text-sm transition-all peer-focus:-top-2 peer-focus:text-xs peer-focus:text-blue-600 peer-valid:-top-2 peer-valid:text-xs">Middle Name</label>
                    </div>
                    <div class="relative">
                        <input required="" name="lastName" type="text" class="peer w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-blue-600 focus:outline-none">
                        <label class="absolute left-4 top-3 text-slate-400 text-sm transition-all peer-focus:-top-2 peer-focus:text-xs peer-focus:text-blue-600 peer-valid:-top-2 peer-valid:text-xs">Last Name</label>
                    </div>
                    <div class="relative">
                        <input required="" name="company" type="text" class="peer w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-blue-600 focus:outline-none">
                        <label class="absolute left-4 top-3 text-slate-400 text-sm transition-all peer-focus:-top-2 peer-focus:text-xs peer-focus:text-blue-600 peer-valid:-top-2 peer-valid:text-xs">Company</label>
                    </div>
                    <div class="relative">
                        <input required="" name="jobTitle" type="text" class="peer w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-blue-600 focus:outline-none">
                        <label class="absolute left-4 top-3 text-slate-400 text-sm transition-all peer-focus:-top-2 peer-focus:text-xs peer-focus:text-blue-600 peer-valid:-top-2 peer-valid:text-xs">Job Title</label>
                    </div>
                    <div class="relative">
                        <input required="" name="email" type="email" class="peer w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-blue-600 focus:outline-none">
                        <label class="absolute left-4 top-3 text-slate-400 text-sm transition-all peer-focus:-top-2 peer-focus:text-xs peer-focus:text-blue-600 peer-valid:-top-2 peer-valid:text-xs">Email</label>
                    </div>
                    <div class="relative">
                        <input required="" name="phone" type="text" class="peer w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-blue-600 focus:outline-none">
                        <label class="absolute left-4 top-3 text-slate-400 text-sm transition-all peer-focus:-top-2 peer-focus:text-xs peer-focus:text-blue-600 peer-valid:-top-2 peer-valid:text-xs">Contact Number</label>
                    </div>
                    <button type="submit" class="w-full mt-2 px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold transition">Submit Registration</button>
                </form>
            </div>
        </div>
    </div>
</div>
